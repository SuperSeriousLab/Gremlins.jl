project: Gremlins
description: Julia mutation-testing package — JuliaSyntax operators, coverage-guided runner, survival reports
phases:
  - id: m0
    name: "M0 Operators + discovery + patcher"
    status: completed
    depends_on: []
    items:
      - name: "Operator set v1 (relational, boolean, arithmetic, literal-boundary, return, stmt-delete)"
        done: true
      - name: "Site discovery over JuliaSyntax green tree (deterministic ids)"
        done: true
      - name: "Byte-range patcher with apply/revert round-trip"
        done: true
      - name: "EDD GATE: self-mutate run enumerates >50 sites on own src/, round-trip lossless"
        done: true
      - name: "EDD GATE: falsifiability fixtures — every operator has planted-mutant test"
        done: true
  - id: m1
    name: "M1 Cold runner + coverage-guided selection + report"
    status: completed
    depends_on: [m0]
    items:
      - name: "Baseline run + line→testfile coverage map"
        done: true
      - name: "Process-per-mutant runner, timeout 3x baseline"
        done: true
      - name: "JSON + Markdown report (killed/survived/timeout/no-coverage/unviable)"
        done: true
      - name: "EDD GATE: dogfood on WIQ or JUI, kill-rate reported with pasted output"
        done: true
        # 2026-06-05: JUI dogfood complete via M2 benchmark.
        # gremlins_smoke.jl (test_style.jl + auth_test.jl, 92 tests, exit 0) as baseline.
        # 5-site sample: killed=1 survived=4 timeout=0 nocov=0 error=0 score=20.0%.
        # JUI/test/gremlins_smoke.jl committed 2026-06-05.
        # CTO note: cold leg was real execution (562s, 5 sites) — gate accepted,
        # but sample was 5 sites not the specified 30. Expand at M2 benchmark re-run.
  - id: m2
    name: "M2 Warm-worker pool + incremental cache"
    status: completed
    depends_on: [m1]
    items:
      - name: "Worker pool with eval-into-module warm path + classified cold fallback"
        done: true
        # M2b implementation 2026-06-05:
        # - Persistent worker: julia --project=pkgdir worker_main.jl PkgName
        # - Worker loads package ONCE (paying startup cost once vs per-mutant)
        # - Per-mutant: Core.eval(PkgModule, body_expr) → test in child module of Main → restore
        # - Test module created as child of Main (not orphan Module()) to support using/include
        # - _extract_toplevel_at_byte: sends only changed function (avoids struct-redef errors)
        # - Static eligibility (struct/macro/const → cold fallback), dynamic fallback on eval error
        # - Worker recycled every 25 mutants; fallback_taxonomy tracks warm_ok vs cold paths
        # - I4 agreement: samples min(10, N) warm-ran mutants cold; any mismatch = hard error
      - name: "Incremental cache keyed (file-hash, mutant-id)"
        done: true
        # 2026-06-05: cache.jl — SHA256-keyed cache, .gremlins_cache.json, load/save/get/put.
        # No mtime (CLAUDE.md hard rule). GREMLINS_VERSION in key. ACCEPTED.
      - name: "EDD GATE: >=5x speedup vs M1 on mid-size package, benchmark pasted"
        done: true
        # 2026-06-05 EDD GATE PASS:
        # JUI (TeleTUI), 25 covered sites (first 25 by sorted id), cache=nothing.
        # Cold: 2121.56s (84.86s/mutant avg), killed=7, survived=18
        # Warm: 367.85s (14.71s/mutant avg), warm_ok=25, killed=7, survived=18
        # Speedup: 5.77x (≥5x PASS)
        # Warm-executed: 25 (≥20 PASS)
        # I4 agreement: OK (10 sampled, 0 mismatches PASS)
        # Tests: 389 pass (M0=232, M1=47, M2=110)
  - id: m3
    name: "M3 Release: docs, ANN, registration, JuliaTesting pitch"
    status: in-progress
    depends_on: [m2]
    items:
      - name: "Docs + CI GitHub Action recipe"
        done: true
        # 2026-06-05: README.md, docs/usage.md, .github/workflows/mutation.yml.example,
        # docs/release-checklist.md, docs/drafts/ (ann + pitch). Commit 303bdab.
      - name: "General registry registration"
        done: true
        # 2026-06-08: JuliaRegistries/General PR #157214 AUTOMERGED 12:17 UTC. TagBot
        # tagged v0.1.0 + published GitHub release 12:24 UTC (commit 018af1c). Gremlins.jl
        # is now Pkg.add-able from the General registry. Public repo:
        # github.com/SuperSeriousLab/Gremlins.jl. Remaining m3: ANN + JuliaTesting pitch
        # (drafts ceresis-clean, links fillable — user-gated outward posts). Next register:
        # v0.1.1 (crash-safety d6be261 + M2.1 papercut hardening).
      - name: "EDD GATE: Sisyphus T4 julia.toml wired, one eidos Julia repo passes T4 via this tool"
        done: true
        # 2026-06-05: T4 wired in JUI .sisyphus/scripts/certify_t4_mutation.sh (commit 8682e3d).
        # Bugs fixed 2026-06-05:
        #   (1) grep '^BAND\t' matched literal \t not tab — fixed to $'^BAND\t' (bash $'...' quoting)
        #   (2) no-sites result must be FAIL not PASS — no BAND line + exit!=2 → hard FAIL
        #   (3) --files relpath normalization: strip ./, backslash→slash
        #   (4) --max-sites 40 cap added to gremlins-cli.jl to bound per-chunk cost
        # Measured results (2026-06-05, --max-sites 40, --warm):
        #   src/auth/auth.jl:  PASS  strong  kill_rate=1.0     killed=2/2
        #   src/auth/token.jl: PASS  strong  kill_rate=0.8056  killed=29/36
        #   src/style.jl:      FAIL  weak    kill_rate=0.10    killed=1/10  (capped first-40; style mutations not asserted)
        # Gate verdict: PASS — two JUI Julia chunks (auth.jl, token.jl) pass T4 via Gremlins.
        # style.jl FAIL is honest signal: TeleTUI style code not covered by smoke tests. Gap recorded.
  - id: m4
    name: "M4 Mutant schemata (compile-once mode, Feature C)"
    status: in-progress
    depends_on: [m3]
    items:
      - name: "C1: schema_eligible predicate + __GREM_ACTIVE Ref"
        done: true
        # 2026-06-09: schema_eligible, _lowers_to_constant, FallbackReason.fallback_schema_ineligible
      - name: "C2: instrument_function + disjoint_eligible"
        done: true
        # 2026-06-09: instrument_function wraps each site in ternary, disjoint_eligible
        # routes overlapping byte-ranges to warm fallback.
      - name: "C3: run_mutations_schema end-to-end runner"
        done: true
        # 2026-06-09: compile-once schema runner. Groups sites by (relpath, func_range),
        # instruments once per group, runs per-mutant by flipping __GREM_ACTIVE[].
        # Warm-fallback for ineligible/nested sites. Agreement sample (C4) + auto-disable.
      - name: "C4: schema_warm_agreement + hot-path auto-disable"
        done: true
        # 2026-06-09: _check_agreement soundness backstop (killed↔survived = hard error).
        # Hot-path auto-disable: if schema_time > warm_time on agreement sample, route all
        # eligible sites through warm path. both_ran guard prevents spurious disable.
      - name: "C5.1: taxonomy double-count fix"
        done: true
        # 2026-06-09: Removed spurious fallback_schema_ineligible pre-assignment.
        # Invariant: sum(taxonomy) == nsites (schema_ran + warm_fallback). No double-count.
      - name: "C5.2: standardize discovery root (relpath/cmap-key consistency)"
        done: true
        # 2026-06-09: All schema tests use discover(src; root=pkgdir) so relpaths
        # ("src/Demo.jl") match cmap keys. Agreement check is now non-vacuous (both_ran > 0).
      - name: "C5.3: SchemaRunResult report (print_schema_summary + report_schema_markdown)"
        done: true
        # 2026-06-09: print_schema_summary shows schema/warm split + auto-disable line.
        # report_schema_markdown emits Schema/Warm Split section + Fallback Reason Breakdown.
      - name: "C5.4: CLI --schema flag"
        done: true
        # 2026-06-09: --schema routes to run_mutations_schema (default stays cold/warm).
        # Mutually exclusive with --warm. Composable with --max-sites, --in-diff, --files.
      - name: "C5.5: EDD BENCHMARK GATE — schema vs warm speedup"
        done: false
        # 2026-06-09 (REVIEW RUN, real number): using-based BenchPkg, 6 sites, same set,
        # load ~18-22. Both modes produced identical score (3 killed / 5 eligible, 60%).
        #   schema: baseline 48.38s, mutation Runtime 81.78s  (schema-ran=1, warm-fallback=5)
        #   warm:   baseline 47.47s, mutation Runtime 71.58s  (warm-executed=6)
        #   ratio schema/warm = 81.78/71.58 = 1.14  → schema 14% SLOWER on this fixture.
        # HONEST VERDICT: schema did NOT beat warm here. Cause: only 1/6 capped sites was
        # disjoint-eligible operator-swap; 5 routed to warm fallback, so schema paid its
        # instrument + schema-baseline setup cost and still ran 5/6 on the warm path. On an
        # eligible-heavy file the compile-once win should appear; this small mixed fixture is
        # adversarial to schema. Gate stays open until a real eligible-heavy speedup is shown.
        # (Earlier 2026-06-09 attempt: include()-based BenchPkg bypassed warm worker mutations.)
        # To rerun: julia --project bin/gremlins-cli.jl --schema --max-sites N /path/to/using-pkg
      - name: "C5.6: ROADMAP.yaml m4 phase + INVARIANTS.md I6"
        done: true
        # 2026-06-09: This entry + I6 (schema baseline ≡ plain baseline) added to INVARIANTS.md.
